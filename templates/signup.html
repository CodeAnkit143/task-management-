<!doctype html><html><head><link rel="stylesheet" href="/static/style.css"></head><body>
<div class="container">
<div class="left">
<h1>Create an account</h1>
<form action="/signup" method="post">
<input name="name" placeholder="Full Name" required>
<input name="email" placeholder="Email" required>
<input name="password" type="password" placeholder="Password" required>
<select name="role" required>
<option value="member">Member</option>
<option value="admin">Admin</option>
</select>
<button>Sign up</button></form>
<p>Already have an account? <a href="/signin">Sign in</a></p>
</div>
<div class="right"><img src="/static/campaign-creators-RSc6D7bO0fA-unsplash.jpg" alt="Task management illustration"></div>
</div></body></html>
